{% extends 'base.html' %}

{% block content %}
<div class="container" style="padding: 60px 0; max-width: 500px;">
    <div class="card shadow-sm p-4">
        <h4 class="mb-3">Upload Hash File</h4>
        <p class="text-muted">Upload the SHA256 hash file to verify and download the document.</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <input type="file" name="hash_file" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Verify & Download
            </button>
        </form>
    </div>
</div>
{% endblock %}
